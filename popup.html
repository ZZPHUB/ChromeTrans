<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; padding: 16px; font-family: system-ui; font-size: 14px; }
    label { display: block; margin-bottom: 6px; color: #333; }
    input  { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    button { width: 100%; margin-top: 12px; padding: 8px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:hover { background: #1557b0; }
    #status { margin-top: 10px; font-size: 12px; color: #666; text-align: center; }
    #status.success { color: #1a7a1a; }
    #status.error   { color: #c5221f; }
    a { font-size: 11px; color: #1a73e8; display: block; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <label for="apikey">DeepSeek API Key</label>
  <input type="password" id="apikey" placeholder="sk-..." autofocus>
  <button id="save">保存</button>
  <div id="status"></div>
  <a href="https://platform.deepseek.com/api_keys" target="_blank">获取 API Key →</a>
  <script src="popup.js"></script>
</body>
</html>
